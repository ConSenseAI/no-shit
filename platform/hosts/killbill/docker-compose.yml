# noshit-f0-killbill — engine-native clock leg (FIXTURES §2.1 rung 1).
#
# Proves: a subscription with an 8-day trial created at virtual T0 converts,
# invoices, and charges when the Kill Bill TEST CLOCK — not wall time — passes
# T0+8d, and a cancel is honored at the period boundary. See README.md.
#
# Bring up / tear down (group-session quirk on this host needs `sg docker`):
#   sg docker -c "docker compose -p noshit-f0-killbill up -d"
#   sg docker -c "docker compose -p noshit-f0-killbill down -v"
# The demo (./demo.sh) does this for you.

name: noshit-f0-killbill

services:
  # MariaDB with the Kill Bill schema pre-loaded. INTERNAL NETWORK ONLY —
  # deliberately no `ports:` mapping. This host runs a live Postgres on 5432
  # and a critical service on 4000; nothing here is ever host-published except
  # the three registered ports (8080 / 8025 / 1025), all bound to loopback.
  db:
    image: ${DB_IMAGE:-killbill/mariadb:0.24}
    environment:
      MYSQL_ROOT_PASSWORD: ${KB_DB_PASSWORD:-killbill}
    networks: [internal]
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p${KB_DB_PASSWORD:-killbill} --silent || mysqladmin ping -h 127.0.0.1 -uroot -p${KB_DB_PASSWORD:-killbill} --silent"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  # Kill Bill in TEST MODE: exposes the server-global movable clock at
  # /1.0/kb/test/clock (FIXTURES §2.1). API on loopback:8080 only.
  killbill:
    image: ${KB_IMAGE:-killbill/killbill:0.24.16}
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DB connection (matches the pre-loaded schema in killbill/mariadb).
      KILLBILL_DAO_URL: jdbc:mysql://db:3306/killbill
      KILLBILL_DAO_USER: root
      KILLBILL_DAO_PASSWORD: ${KB_DB_PASSWORD:-killbill}
      # THE switch: org.killbill.server.test.mode=true -> test clock endpoints.
      KILLBILL_SERVER_TEST_MODE: "true"
      # Platform SMTP pointed at the mailpit sink (internal net). Mail props have
      # NO legacy KILLBILL_* alias in the image's setenv2.sh, so they must be
      # given in the canonical KB_org_killbill_* form (-> org.killbill.mail.*).
      # The email-notifications plugin (stretch) additionally needs a per-tenant
      # SMTP config uploaded via REST; demo.py does that when the plugin is present.
      KB_org_killbill_mail_smtp_host: mailpit
      KB_org_killbill_mail_smtp_port: "1025"
      KB_org_killbill_mail_smtp_useAuthentication: "false"
      KB_org_killbill_mail_useSSL: "false"
      KB_org_killbill_mail_from: noreply@fixtures.local
    ports:
      - "127.0.0.1:${KB_API_PORT:-8080}:8080"
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/1.0/healthcheck || wget -q -O- http://127.0.0.1:8080/1.0/healthcheck || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 40
      start_period: 45s

  # Per-fixture SMTP sink (FIXTURES §2.2). UI on 8025, SMTP on 1025 (loopback).
  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.21.8}
    networks: [internal]
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

networks:
  internal:
    driver: bridge

volumes:
  dbdata:
