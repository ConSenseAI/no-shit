# noshit-f1-mastodon — F1 platform proof, Mastodon leg (the nli★ gold standard).
#
# Proves the platform's EXPORT / MIGRATION / DELETE baseline on a NEW heavy host
# (FIXTURES §2.2 msg-channel census + absence, §2.3 bulk seeding, §3 nli★ role).
# Mastodon is the bench's gold-standard host for `no-lock-in` (nli): its account
# archive (ActivityPub actor+outbox), CSV data exports, and clean self-deletion
# are the *reference* clean flows that later degradation implants are measured
# against. This leg is PUBLIC platform/demo code (Apache-2.0): no study fixtures,
# no labels, no implants.
#
# ── PORT-4000 HAZARD (hard rule) ────────────────────────────────────────────
# Mastodon's STREAMING service listens on 4000 by default, and host port 4000
# runs a critical unrelated live service. THIS COMPOSE HAS NO STREAMING SERVICE.
# The `web` (puma) container serves the REST API and the web UI (which polls when
# streaming is absent); every proof here rides the REST API + session web
# endpoints, none of which need streaming. Nothing below publishes, exposes, or
# references host port 4000. The Mastodon web image exposes only 3000/tcp.
#
# Host-published ports are loopback-only and limited to this leg's registry
# allocation: web 3002, mailpit UI 8032 / SMTP 1032. Postgres and Redis are on
# the internal network ONLY and are NEVER host-published (the machine runs a live
# Postgres on 5432).
name: noshit-f1-mastodon

# Shared Mastodon runtime env (web + sidekiq are the SAME image, different command
# and must agree on every value). Secrets come from the gitignored .env that
# setup.sh generates with the image's OWN rake tasks (rule 5). See README for the
# LOCAL_DOMAIN / https-link combination and why it is the least-hacky one.
x-mastodon-env: &mastodon-env
  RAILS_ENV: production
  # nli★ identity host. Generated URLs use https://localhost/... in production
  # (Rails hardcodes the https scheme; no supported http toggle since v3.0). The
  # demo clients send X-Forwarded-Proto: https (production's TLS-proxy model) and
  # rewrite emailed https://localhost links to http://localhost:3002 to follow
  # them against the mapped loopback port — the token/path is what the server
  # validates. Documented in README (deviation: LOCAL_DOMAIN / links).
  LOCAL_DOMAIN: localhost
  # --- Postgres (internal only) ---
  DB_HOST: db
  DB_PORT: "5432"
  DB_NAME: mastodon_production
  DB_USER: mastodon
  DB_PASS: ${POSTGRES_PASSWORD:?run ./setup.sh to generate .env}
  # --- Redis (internal only) ---
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  # --- Secrets (generated by setup.sh via the image's rake tasks; gitignored) ---
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:?run ./setup.sh to generate .env}
  OTP_SECRET: ${OTP_SECRET:?run ./setup.sh to generate .env}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:?run ./setup.sh to generate .env}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:?run ./setup.sh to generate .env}
  # Mastodon v4.3+ requires the ActiveRecord encryption trio (db:encryption:init).
  ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY:?run ./setup.sh to generate .env}
  ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT:?run ./setup.sh to generate .env}
  ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY:?run ./setup.sh to generate .env}
  # --- Local file storage for media + account archives (served by puma) ---
  RAILS_SERVE_STATIC_FILES: "true"
  RAILS_LOG_LEVEL: warn
  # --- SMTP → the leg's Mailpit sink (auth none, no TLS) ---
  SMTP_SERVER: mailpit
  SMTP_PORT: "1025"
  SMTP_LOGIN: ""
  SMTP_PASSWORD: ""
  SMTP_AUTH_METHOD: none
  SMTP_OPENSSL_VERIFY_MODE: none
  SMTP_ENABLE_STARTTLS: "never"
  SMTP_DOMAIN: localhost
  SMTP_FROM_ADDRESS: "Mastodon <notifications@localhost>"

services:
  # --- Postgres: internal only, NEVER host-published --------------------------
  # Runs as the host uid (1000:1000) so the bind-mounted data dir under
  # fixture-runtime stays host-owned and the documented reset path works without
  # sudo (listmonk pattern). PGDATA is a subdir of the mount; the image's socket
  # dir is backed by a writable tmpfs (uid 1000 cannot write the image's default
  # /var/run/postgresql). Mastodon connects over TCP (host: db).
  db:
    image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    user: "1000:1000"
    environment:
      POSTGRES_USER: mastodon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./setup.sh to generate .env}
      POSTGRES_DB: mastodon_production
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U mastodon -d mastodon_production"]
      interval: 5s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/run/postgresql:mode=1777
    volumes:
      - /home/user/fixture-runtime/mastodon/db:/var/lib/postgresql/data
    networks: [internal]

  # --- Redis: internal only, NEVER host-published -----------------------------
  # Sidekiq queues + Rails cache. Runs as uid 1000 for a sudo-less reset; data
  # bind-mounted (appendonly) so it survives teardown consistently.
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    user: "1000:1000"
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - /home/user/fixture-runtime/mastodon/redis:/data
    networks: [internal]

  # --- Mailpit: the per-fixture SMTP sink (msg-channel census) ----------------
  mailpit:
    image: axllent/mailpit:v1.30.4@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
    environment:
      # Accept whatever auth Mastodon's SMTP client offers (here: none) over the
      # plaintext internal link, so confirmation / archive-ready mail is captured.
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      # Never auto-prune: per-address absence windows must be sound over the whole
      # run (platform no-prune-during-absence-windows rule).
      MP_MAX_MESSAGES: "0"
    ports:
      - "127.0.0.1:8032:8025"   # UI + REST API (harness/mailsink.py talks here)
      - "127.0.0.1:1032:1025"   # SMTP submission (Mastodon sends here internally)
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]

  # --- Mastodon web (puma): the app under test — REST API + web UI ------------
  # Runs as the image's own uid 991 (its /opt/mastodon is mode 700, owner-only —
  # cannot run as another uid). public/system (media + account archives) is the
  # ONLY bind mount; setup.sh chowns it to 991. Schema is loaded out-of-band by
  # demo.sh BEFORE this service starts (staged bring-up), because /health needs a
  # migrated DB. Streaming is intentionally ABSENT (port-4000 hazard).
  web:
    image: ghcr.io/mastodon/mastodon:v4.6.2@sha256:c5a92a6ec505086060a5a1fdec3be286da7f3cbd06e5158359e7f720e14b912c
    command: ["bundle", "exec", "puma", "-C", "config/puma.rb"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment: *mastodon-env
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - /home/user/fixture-runtime/mastodon/system:/opt/mastodon/public/system
      # provisioning rails-runner scripts (committed, no secrets) — read-only.
      - ./provision:/provision:ro
    healthcheck:
      # /health is Mastodon's public liveness endpoint (200 "OK") and serves over
      # plain http even in production (same check the official compose uses).
      test: ["CMD-SHELL", "wget -q --spider --tries=1 http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [internal]

  # --- Mastodon sidekiq: background jobs (mailers, BackupService, deletion) ----
  # SAME image as web, different command. Every mail Mastodon sends and every
  # account archive / deletion runs through here — so this is what the absence
  # windows anchor to (drained to enqueued=0 busy=0, never a timer).
  sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.6.2@sha256:c5a92a6ec505086060a5a1fdec3be286da7f3cbd06e5158359e7f720e14b912c
    command: ["bundle", "exec", "sidekiq"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *mastodon-env
    volumes:
      - /home/user/fixture-runtime/mastodon/system:/opt/mastodon/public/system
      - ./provision:/provision:ro
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[s]idekiq' >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s
    networks: [internal]

networks:
  internal:
    driver: bridge
