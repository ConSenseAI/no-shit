# noshit-f0-documenso — F0 platform proof, Documenso leg.
#
# Proves three of the four F0 exit criteria (platform/README.md):
#   2  app/sink coupling + post-deletion absence window   (documenso -> mailpit)
#   3  stack-level fake time across a multi-day boundary   (scheduler sidecar)
#   4  scripted support persona round-trip                 (personas/responder.py)
#
# Host-published ports are loopback-only and limited to the leg's registry
# allocation: documenso 3600, mailpit UI 8026 / SMTP 1026. Postgres is on the
# internal network ONLY and is never host-published.
name: noshit-f0-documenso

services:
  # --- Postgres: internal only, NEVER host-published --------------------------
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: documenso
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./setup.sh to generate .env}
      POSTGRES_DB: documenso
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documenso -d documenso"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]

  # --- Mailpit: the per-fixture SMTP sink (msg-channel census) ----------------
  mailpit:
    image: axllent/mailpit:v1.30.4
    environment:
      # Accept whatever auth Documenso's nodemailer offers (incl. none) over the
      # plaintext internal link, so signup/verify mail is captured reliably.
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      # Never auto-prune: absence windows must be sound over the whole run.
      MP_MAX_MESSAGES: "0"
    ports:
      - "127.0.0.1:8026:8025"   # UI + REST API (harness/mailsink.py talks here)
      - "127.0.0.1:1026:1025"   # SMTP submission (persona + sidecar send here)
    networks: [internal]

  # --- Documenso: the real app under test -------------------------------------
  documenso:
    image: documenso/documenso:v2.14.0
    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      PORT: "3600"                       # listen on 3600 in-container; 3000 is never published
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?}
      NEXT_PRIVATE_ENCRYPTION_KEY: ${NEXT_PRIVATE_ENCRYPTION_KEY:?}
      NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: ${NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY:?}
      NEXT_PUBLIC_WEBAPP_URL: "http://localhost:3600"
      NEXT_PRIVATE_INTERNAL_WEBAPP_URL: "http://localhost:3600"
      NEXT_PRIVATE_DATABASE_URL: "postgresql://documenso:${POSTGRES_PASSWORD}@database:5432/documenso"
      NEXT_PRIVATE_DIRECT_DATABASE_URL: "postgresql://documenso:${POSTGRES_PASSWORD}@database:5432/documenso"
      NEXT_PUBLIC_UPLOAD_TRANSPORT: "database"
      NEXT_PRIVATE_JOBS_PROVIDER: "local"
      # SMTP -> mailpit sink (internal network, plaintext, no TLS).
      NEXT_PRIVATE_SMTP_TRANSPORT: "smtp-auth"
      NEXT_PRIVATE_SMTP_HOST: "mailpit"
      NEXT_PRIVATE_SMTP_PORT: "1025"
      NEXT_PRIVATE_SMTP_USERNAME: "documenso"
      NEXT_PRIVATE_SMTP_PASSWORD: "documenso"
      NEXT_PRIVATE_SMTP_SECURE: "false"
      NEXT_PRIVATE_SMTP_UNSAFE_IGNORE_TLS: "true"
      NEXT_PRIVATE_SMTP_FROM_NAME: "Documenso F0"
      NEXT_PRIVATE_SMTP_FROM_ADDRESS: "noreply@documenso.test"
      # Local signing transport; cert.p12 is generated by setup.sh and mounted RO.
      NEXT_PRIVATE_SIGNING_TRANSPORT: "local"
      NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH: "/opt/documenso/cert.p12"
      NEXT_PRIVATE_SIGNING_PASSPHRASE: ${NEXT_PRIVATE_SIGNING_PASSPHRASE:-}
      NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT: "5"
      DOCUMENSO_DISABLE_TELEMETRY: "true"
      NODE_ENV: "production"
    ports:
      - "127.0.0.1:3600:3600"
    volumes:
      - ./data/cert.p12:/opt/documenso/cert.p12:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3600/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 90s
    networks: [internal]

  # --- Fake-time sidecar: FIXTURES §2.1 rung 2 (glibc, LD_PRELOAD libfaketime)-
  # A minimal app-side scheduler whose day-30 "retention window expired" job
  # fires only when its FAKED clock crosses the boundary. The demo advances the
  # faked clock (data/faketime/faketimerc) across 30+ days in seconds of wall
  # time; the job's purge notice lands in the sink. Documenso's own container is
  # musl/alpine, so glibc libfaketime cannot preload into it (see README).
  scheduler:
    # Pre-built by demo.sh with the classic builder (host buildx predates the
    # version compose's own `build` requires): docker build -t <image> ./sidecar
    image: noshit-f0-documenso-scheduler:local
    build: ./sidecar
    depends_on:
      mailpit:
        condition: service_started
    environment:
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      RETENTION_DAYS: "30"
      RETENTION_ACCOUNT: "retention-subject@noshit.test"
      # libfaketime, file-driven so the host can move the clock at runtime.
      LD_PRELOAD: "/opt/libfaketime.so"
      FAKETIME_TIMESTAMP_FILE: "/faketime/faketimerc"
      FAKETIME_NO_CACHE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data/faketime:/faketime
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
